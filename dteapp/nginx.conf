# ============================================================
# Nginx Configuration for DTE Recruitment Portal (SPA)
# ============================================================

server {
    listen       3000;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Static Asset Caching ──────────────────────────────────
    # Vite fingerprints all assets (e.g. main-Abc123.js), so they
    # can be cached aggressively forever. index.html must NOT be cached
    # so users always get the latest version.

    # Long-lived cache for fingerprinted assets
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html (entry point for the SPA)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── SPA Fallback (React Router) ───────────────────────────
    # All routes that don't match a real file fall back to index.html
    # so React Router can handle client-side navigation correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable Access to Hidden Files ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Custom Error Pages ────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
